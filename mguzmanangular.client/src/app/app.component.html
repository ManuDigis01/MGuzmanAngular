<app-header></app-header>

<div class="container my-5">

  <!-- Título -->
  <div class="mb-4">
    <h2 class="fw-semibold text-primary">Weather Forecast</h2>
    <p class="text-muted mb-0">
      Consulta de datos obtenidos desde el servidor ASP.NET Core.
    </p>
  </div>

  <!-- Loading -->
  <div *ngIf="!forecasts" class="text-center my-5">
    <div class="spinner-border text-primary" role="status"></div>
    <p class="mt-3 text-muted">Cargando información...</p>
  </div>

  <!-- Tabla -->
  <div *ngIf="forecasts" class="card shadow-sm border-0">
    <div class="card-body p-0">

      <table class="table table-hover table-striped mb-0">
        <thead class="table-light">
          <tr>
            <th>Fecha</th>
            <th>Temp. (C)</th>
            <th>Temp. (F)</th>
            <th>Resumen</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let forecast of forecasts">
            <td>{{ forecast.date }}</td>
            <td>{{ forecast.temperatureC }}</td>
            <td>{{ forecast.temperatureF }}</td>
            <td>{{ forecast.summary }}</td>
          </tr>
        </tbody>
      </table>

    </div>
  </div>

  <!-- Botón -->
  <div class="text-end mt-4">
    <button type="button" class="btn btn-outline-primary px-4">
      Acción
    </button>
  </div>

</div>

<app-footer></app-footer>
